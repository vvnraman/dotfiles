# vim: ft=hyprlang
###################
### KEYBINDINGS ###
###################

# https://wiki.hypr.land/Configuring/Binds/

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

#################
# Workspace binds
#################

# Switch workspaces with mainMod + [0-9]
bindd = $mainMod          , 1, Switch to Workspace 1                , workspace , 1
bindd = $mainMod          , 2, Switch to Workspace 2                , workspace , 2
bindd = $mainMod          , 3, Switch to Workspace 3                , workspace , 3
bindd = $mainMod          , 4, Switch to Workspace 4                , workspace , 4
bindd = $mainMod          , 5, Switch to Workspace 5                , workspace , 5
bindd = $mainMod          , 6, Switch to Workspace 6                , workspace , 6
bindd = $mainMod          , 7, Switch to Workspace 7                , workspace , 7
bindd = $mainMod          , 8, Switch to Workspace 8                , workspace , 8
bindd = $mainMod          , 9, Switch to Workspace 9                , workspace , 9
bindd = $mainMod          , 0, Switch to Workspace 10               , workspace , 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bindd = $mainMod SHIFT    , 1, Move Window to Workspace 1           , movetoworkspace, 1
bindd = $mainMod SHIFT    , 2, Move Window to Workspace 2           , movetoworkspace, 2
bindd = $mainMod SHIFT    , 3, Move Window to Workspace 3           , movetoworkspace, 3
bindd = $mainMod SHIFT    , 4, Move Window to Workspace 4           , movetoworkspace, 4
bindd = $mainMod SHIFT    , 5, Move Window to Workspace 5           , movetoworkspace, 5
bindd = $mainMod SHIFT    , 6, Move Window to Workspace 6           , movetoworkspace, 6
bindd = $mainMod SHIFT    , 7, Move Window to Workspace 7           , movetoworkspace, 7
bindd = $mainMod SHIFT    , 8, Move Window to Workspace 8           , movetoworkspace, 8
bindd = $mainMod SHIFT    , 9, Move Window to Workspace 9           , movetoworkspace, 9
bindd = $mainMod SHIFT    , 0, Move Window to Workspace 10          , movetoworkspace, 10

# Move active window to a workspace SILENTLY with mainMod + SHIFT + ALT + [0-9]
bindd = $mainMod SHIFT ALT, 1, Move Window silently to Workspace 1  , movetoworkspacesilent, 1
bindd = $mainMod SHIFT ALT, 2, Move Window silently to Workspace 2  , movetoworkspacesilent, 2
bindd = $mainMod SHIFT ALT, 3, Move Window silently to Workspace 3  , movetoworkspacesilent, 3
bindd = $mainMod SHIFT ALT, 4, Move Window silently to Workspace 4  , movetoworkspacesilent, 4
bindd = $mainMod SHIFT ALT, 5, Move Window silently to Workspace 5  , movetoworkspacesilent, 5
bindd = $mainMod SHIFT ALT, 6, Move Window silently to Workspace 6  , movetoworkspacesilent, 6
bindd = $mainMod SHIFT ALT, 7, Move Window silently to Workspace 7  , movetoworkspacesilent, 7
bindd = $mainMod SHIFT ALT, 8, Move Window silently to Workspace 8  , movetoworkspacesilent, 8
bindd = $mainMod SHIFT ALT, 9, Move Window silently to Workspace 9  , movetoworkspacesilent, 9
bindd = $mainMod SHIFT ALT, 0, Move Window silently to Workspace 10 , movetoworkspacesilent, 10

# Cycle to next/prev workspace
bindd = $mainMod            , Tab           , Toggle Prior Workspace    , workspace, previous_per_monitor

# Next/prev workspace on the current monitor
bindd = $mainMod            , bracketright  , Monitor - Next Workspace  , workspace, m+1
bindd = $mainMod            , bracketleft   , Monitor - Prev Workspace  , workspace, m-1

# Next/prev workspace in general
bindd = $mainMod SHIFT      , bracketright  , Next Workspace            , workspace, e+1
bindd = $mainMod SHIFT      , bracketleft   , Prev Workspace            , workspace, e-1

##############
# Resize binds
##############

# Move active window with mainMod + LMB/RMB and dragging
# m = mouse
bindmd = $mainMod           , mouse:272 , Move Window       , movewindow
bindmd = $mainMod           , mouse:273 , Resize Window     , resizewindow

# Resize active window with mainMod + '='(Unshifted +)/'-'
# m = mouse
bindd = $mainMod            , minus     , Expand Window Left            , resizeactive, -64 0
bindd = $mainMod ALT        , minus     , Expand Window Left Precisely  , resizeactive, -16 0
bindd = $mainMod ALT        , mouse_up  , Expand Window Left Precisely  , resizeactive, -16 0
bindd = $mainMod            , equal     , Shrink Window Left            , resizeactive,  64 0
bindd = $mainMod ALT        , equal     , Shrink Window Left Precisely  , resizeactive,  16 0
bindd = $mainMod ALT        , mouse_down, Expand Window Left Precisely  , resizeactive,  16 0
bindd = $mainMod SHIFT      , minus     , Shrink Window Up              , resizeactive,  0 -64
bindd = $mainMod ALT SHIFT  , minus     , Shrink Window Up Precisely    , resizeactive,  0 -16
bindd = $mainMod SHIFT      , equal     , Expand Window Down            , resizeactive,  0  64
bindd = $mainMod ALT SHIFT  , equal     , Expand Window Down Precisely  , resizeactive,  0  16

###############
# Monitor binds
###############

# Focus monitor
bindd = $mainMod, M, Focus next Monitor, focusmonitor, +1

# Move workspace to left or right monitor
bindd = $mainMod ALT SHIFT  , left      , Move Wksp to Left Monitor , movecurrentworkspacetomonitor, l
bindd = $mainMod ALT SHIFT  , right     , Move Wksp to Right Monitor, movecurrentworkspacetomonitor, r

# Move workspace to monitor, relative, cycle monitor
bindd = $mainMod ALT SHIFT  , up        , Move Wksp to Next Monitor ,  movecurrentworkspacetomonitor, +1
bindd = $mainMod ALT SHIFT  , down      , Move Wksp to Prev Monitor ,  movecurrentworkspacetomonitor, -1

#############
# Focus binds
#############

# Move focus with mainMod + arrow keys
bindd = $mainMod            , left      , Focus Left  Window/Group  , movefocus     , l
bindd = $mainMod            , right     , Focus Right Window/Group  , movefocus     , r
bindd = $mainMod            , up        , Focus Up    Window/Group  , movefocus     , u
bindd = $mainMod            , down      , Focus Down  Window/Group  , movefocus     , d

# Swap window positions with mainMod + ALT + arrow keys
bindd = $mainMod SHIFT      , left      , Swap Left  Window/Group   , swapwindow    , l
bindd = $mainMod SHIFT      , right     , Swap Right Window/Group   , swapwindow    , r
bindd = $mainMod SHIFT      , up        , Swap Up    Window/Group   , swapwindow    , u
bindd = $mainMod SHIFT      , down      , Swap Down  Window/Group   , swapwindow    , d

# Poor man's Alt+Tab
bindd =          ALT        , TAB       , Cycle window focus        , focuscurrentorlast

#############
# Group binds
#############

bindd = $mainMod            , G           , Toggle Grouping         , togglegroup
bindd = $mainMod ALT        , G           , Move Out of Group       , moveoutofgroup
bindd = $mainMod CTRL SHIFT , G           , Lock Current Group      , lockgroups
bindd = $mainMod ALT CTRL   , G           , Block Grouping          , denywindowfromgroup

# Change focused window in group
bindd = $mainMod ALT        , 0           , First Window in Group   , changegroupactive , 1
bindd = $mainMod            , semicolon   , Next Window in Group    , changegroupactive , f
bindd = $mainMod            , comma       , Prev Window in Group    , changegroupactive , b

# Cycle through focused window in group
bindd = $mainMod            , period      , Cycle in Group        , changegroupactive

# Move focused window to next/previous group (or out of group)
bindd = $mainMod ALT        , left        , Put Window in Left  Group, moveintogroup     , l
bindd = $mainMod ALT        , right       , Put Window in Right Group, moveintogroup     , r
bindd = $mainMod ALT        , up          , Put Window in Up    Group, moveintogroup     , u
bindd = $mainMod ALT        , down        , Put Window in Down  Group, moveintogroup     , d

##############
# Window binds
##############

bindd = $mainMod            , F, Full Screen (+ Taskbar)   , fullscreen    , 1
bindd = $mainMod SHIFT      , F, Full Screen 100%          , fullscreen    , 0
bindd = $mainMod SHIFT      , J, Toggle Window Split       , togglesplit   , # dwindle
bindd = $mainMod SHIFT      , P, Pseudo Window             , pseudo        , # dwindle
bindd = $mainMod SHIFT      , V, Toggle Window Float/Tile  , togglefloating,

#########################
# Special workspace binds
#########################

# Example special workspace (scratchpad)
bindd = $mainMod ALT        , S, Toggle scratchpad             , togglespecialworkspace    , scratchpad
bindd = $mainMod SHIFT      , S, Move Window to scratchpad     , movetoworkspace           , special:scratchpad
bindd = $mainMod ALT SHIFT  , S, Banish Window to scratchpad   , movetoworkspacesilent     , special:scratchpad

#######################################################
# Custom binds
#
# - These can conflict with binds in other sections
# - Be extra careful when adding or updating binds here
#######################################################

bindd = $mainMod             , RETURN    , Terminal             , exec          , $terminal
bindd = $mainMod SHIFT       , RETURN    , Terminal             , exec          , $terminal_bash
bindd = $mainMod ALT         , RETURN    , Alternative Terminal , exec          , $terminal_alt
bindd = $mainMod             , B         , Browser              , exec          , $browser
bindd = $mainMod             , C         , Colour Picker        , exec          , hyprpicker --quiet
bindd = $mainMod CTRL        , B         , Turn display on & on , exec          , hyprctl dispatch dpms on && sleep 1 && hyprctl dispatch dpms on
bindd = $mainMod             , SPACE     , Applications         , exec          , $menu
bindd = $mainMod             , E         , Explorer             , exec          , $fileManager
bindd = $mainMod             , H         , Handy Start          , exec          , handy --toggle-transcription
bindd = $mainMod CTRL        , H         , Handy Cancel         , exec          , handy --cancel
bindd = $mainMod SHIFT       , K         , Keybinds             , exec          , ~/.config/hypr/scripts/hyprland-keybinds.sh
bindd = $mainMod CTRL        , K         , ZSA Keymapp          , exec          , [workspace special:scratchpad; float; move 100%-w-10 75] ~/.local/bin/keymapp
bindd = $mainMod SHIFT       , L         , Lock screen          , exec          , ~/.config/hypr/scripts/hyprlock.sh
bindd = $mainMod             , N         , Editor (Terminal)    , exec          , $editor
bindd = $mainMod SHIFT       , N         , Editor (Standalone)  , exec          , neovide
bindd = $mainMod CTRL SHIFT  , Q         , Exit Hyprland        , exec          , ~/.config/hypr/scripts/hyprland-logout.sh
bindd = $mainMod SHIFT       , R         , Reload Hyprland      , exec          , hyprctl reload
bindd = $mainMod CTRL SHIFT  , S         , Hyprsunset Sunrise   , exec          , hyprctl hyprsunset identity
bindd = $mainMod ALT SHIFT   , S         , Hyprsunset Reset     , exec          , hyprctl hyprsunset reset
bindd = $mainMod             , X         , HyprExpo             , hyprexpo:expo , toggle
bindd = $mainMod CTRL        , Z         , Go to sleep          , exec          , loginctl lock-session && sleep 0.8 && systemctl suspend
bindd = $mainMod             , W         , Close Window         , killactive    ,
bindd =                      , PRINT     , Screenshot Monitor   , exec          , ~/.config/hypr/scripts/hypr-screenshot.sh --mode=monitor
bindd =          CTRL        , PRINT     , Screenshot Window    , exec          , ~/.config/hypr/scripts/hypr-screenshot.sh --mode=window
bindd = $mainMod             , PRINT     , Screenshot Region    , exec          , ~/.config/hypr/scripts/hypr-screenshot.sh --mode=region
# Security leak to keep passwords in clipboard
# bind = $mainMod , V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

##################
# Multimedia binds
##################

# Laptop multimedia keys for volume and LCD brightness
# e = repeat, when held
# l = locked, will work with a lockscreen (or any input inhibitor) active
bindel = ,XF86AudioRaiseVolume  , exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume  , exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute         , exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute      , exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp   , exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown , exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
# l = locked, will work with a lockscreen (or any input inhibitor) active
bindl = , XF86AudioNext     , exec, playerctl next
bindl = , XF86AudioPause    , exec, playerctl play-pause
bindl = , XF86AudioPlay     , exec, playerctl play-pause
bindl = , XF86AudioPrev     , exec, playerctl previous

######
# Zoom
######
bind  = $mainMod CTRL   , mouse_down   , exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $mainMod CTRL   , equal        , exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind  = $mainMod CTRL   , mouse_up     , exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
binde = $mainMod CTRL   , minus        , exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
bind  = $mainMod SHIFT  , mouse_up     , exec, hyprctl -q keyword cursor:zoom_factor 1
bind  = $mainMod SHIFT  , mouse_down   , exec, hyprctl -q keyword cursor:zoom_factor 1
bind  = $mainMod SHIFT  , minus        , exec, hyprctl -q keyword cursor:zoom_factor 1
bind  = $mainMod SHIFT  , KP_SUBTRACT  , exec, hyprctl -q keyword cursor:zoom_factor 1
bind  = $mainMod SHIFT  , Escape       , exec, hyprctl -q keyword cursor:zoom_factor 1


############################
# Application specific binds
############################

# Keybind to open hypremoji
bind = SUPER, backslash, exec, hypremoji

