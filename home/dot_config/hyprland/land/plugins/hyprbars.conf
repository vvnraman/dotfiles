# vim: ft=hyprlang
plugin {
  hyprbars {
    bar_height = 20
    bar_padding = 10
    bar_button_padding = 10

    bar_blur = true
    bar_buttons_alignment = left
    bar_title_enabled = false

    hyprbars-button = rgb(ff4040), 12, 󰖭, hyprctl dispatch killactive
    hyprbars-button = rgb(eeee11), 12, , hyprctl dispatch fullscreen 1
    hyprbars-button = rgb(ff8c00), 12, 󰐃, ~/.config/hyprland/scripts/hypr-toggle-pin.sh
    hyprbars-button = rgb(44bbff), 12, 󰀱, ~/.config/hyprland/scripts/hypr-toggle-anchor.sh
  }
}
