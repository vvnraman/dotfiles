# vim: ft=hyprlang

# Common
########

windowrule {
  name = wr-floating-apps
  tag = +floating-window
  match:class = (org.gnome.NautilusPreviewer|org.gnome.Evince|com.gabm.satty|About|TUI.float|imv|mpv)
}

windowrule {
  name = wr-floating-app-popups
  tag = +floating-window
  match:class = (xdg-desktop-portal-gtk|sublime_text|DesktopEditors|org.gnome.Nautilus)
  match:title = ^(Open.*Files?|Open [F|f]older.*|Save.*Files?|Save.*As|Save|All Files|.*wants to [open|save].*|[C|c]hoose.*)
}

windowrule {
  name = wr-float-calculator
  float = on
  match:class = org.gnome.Calculator
}

# No transparency on media windows
windowrule {
  name = wr-opaque-apps
  opacity = 1 1
  match:class = ^(zoom|vlc|mpv|org.kde.kdenlive|com.obsproject.Studio|com.github.PintaProject.Pinta|imv|org.gnome.NautilusPreviewer)$
}

# Prevent idle while open
windowrule {
  name = wr-no-idle
  idle_inhibit = always
  match:tag = noidle
}

# Terminals
###########
# Define terminal tag to style them uniformly
windowrule {
  name = wr-terminals
  tag = +terminal
  match:class = (Alacritty|kitty|com.mitchellh.ghostty)
}
