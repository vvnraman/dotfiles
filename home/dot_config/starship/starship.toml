# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$os\
$username\
${env_var.spaces}\
$shell\
$hostname\
$directory\
($git_state)\
($git_status)\
[оӮ°](fg:prev_bg)\
$cmd_duration\
$line_break\
$character\
$git_branch\
$git_commit\
($git_metrics)\
[ ]()"""

palette = 'vvnraman_catppuccin'

# borrowed from catppuccin palettes
[palettes.vvnraman_catppuccin]
prompt_bg = '#363a4f'
vim_fg = '#40a02b'
vim_r_fg = '#24273a'
vim_r_bg = '#f5a97f'
vim_v_fg = '#d79921'
custom_fg = '#f5bde6'
custom_bg = '#494d64'
user_fg = '#7dc4e4'
root_fg = '#ed8796'
host_fg = '#6e738d'
host_bg = '#24273a'
dir_fg = '#939ab7'
dir_bg = '#24273a'
time_bg = '#3c3836'
peach = '#f5a97f'
mauve = '#c6a0f6'
red = '#cc241d'
git_s_c = '#ee99a0'
git_s_st = '#b7bdf8'
git_s_d = '#ed8796'
git_s_r = '#c6a0f6'
git_s_m = '#8bd5ca'
git_s_sg = '#eed49f'
git_s_u = '#a5adcb'
git_b_bg = '#7287fd'
git_m_a_fg = '#a6da95'
git_m_d_fg = '#ed8796'
git_metrics_bg = '#363a4f'
git_status_bg = "#363a4f"
crust = '#11111b'

#вҷӘвҷ«
[character]
format = '$symbol'
success_symbol = '[[оӮә](fg:prompt_bg)[вҷӘ](fg:crust bg:prompt_bg)оӮј](fg:prompt_bg)'
error_symbol = '[оӮә[вң—](fg:prompt_bg bg:red)оӮј](fg:red)'
vimcmd_symbol = '[оӮә[оҳ«](fg:vim_fg bg:prompt_bg)оӮј](fg:prompt_bg)'
vimcmd_replace_one_symbol = '[оӮә[оҳ«](fg:vim_r_fg bg:vim_r_bg)оӮј](bold fg:vim_r_bg)'
vimcmd_replace_symbol = '[оӮә[оҳ«](fg:vim_r_fg bg:vim_r_bg)оӮј](bold fg:vim_r_bg)'
vimcmd_visual_symbol = '[оӮә[оҳ«](fg:prompt_bg bg:vim_v_fg)оӮј](bold fg:vim_v_fg)'

[os]
disabled = false
style = "fg:crust bg:prev_fg"
format = '[оӮҫ](fg:prompt_bg)[$symbol]($style)'

[username]
show_always = true
style_user = "fg:user_fg bg:crust"
style_root = "fg:root_fg bg:crust"
format = '[оӮҫ](fg:prev_fg bg:prev_bg)[ $user ]($style)'

[shell]
style = "fg:user_fg bg:crust"
format = '[оӮҫ](fg:crust bg:crust)[$indicator]($style)'
fish_indicator = 'у°Ҳә '
bash_indicator = 'п‘ _'
disabled = false

[hostname]
ssh_only=false
trim_at = "."
style='fg:host_fg bg:host_bg'
format = '[оӮҫ](fg:host_bg bg:prev_bg)[ $ssh_symbol$hostname]($style)'

# BUG: This doesn't work.
[env_var.spaces]
symbol = 'пҗ§'
variable = "SPACES__ENV"
format = '[оӮҫ](fg:host_bg bg:prev_bg)[ $symbol ](fg:host_fg bg:host_bg)'

[directory]
style = "fg:dir_fg bg:dir_bg"
format = "[оӮҫ](bg:prev_bg fg:dir_bg)[$path ]($style)"
home_symbol = 'рҹҸ '
truncation_length = 8
truncate_to_repo = false
truncation_symbol = "вҖҰ/"

[git_state]
style = "fg:peach bg:mauve"
format = '[оӮҫ](bg:prev_bg fg:mauve)\([$state( $progress_current/$progress_total)]($style)\) '

[git_status]
style = "bg:git_status_bg"
format = '[оӮё](fg:prev_bg bg:git_status_bg)[[($all_status$ahead_behind )](fg:prompt_bg bg:git_status_bg)]($style)'
conflicted = '[ оҖү${count}](fg:git_s_c bg:git_status_bg)'
stashed = '[ вҡ‘${count}](fg:git_s_st bg:git_status_bg)'
deleted = '[ пҖҚ${count}](fg:git_s_d bg:git_status_bg)'
renamed = '[ п‘ғ${count}](fg:git_s_r bg:git_status_bg)'
modified = '[ в—Ҹ${count}](fg:git_s_m bg:git_status_bg)'
staged = '[ вң“${count}](fg:git_s_sg bg:git_status_bg)'
untracked = '[ ?${count}](fg:git_s_u bg:git_status_bg)'

[git_branch]
symbol = "о©Ё"
style = "bg:git_b_bg"
format = '[оӮә](fg:git_b_bg)[[ $symbol $branch(:$remote_branch) ](fg:crust bg:git_b_bg)]($style)[оӮј](fg:git_b_bg bg:git_metrics_bg)'

[git_metrics]
added_style="fg:git_m_a_fg bg:git_metrics_bg"
deleted_style="fg:git_m_d_fg bg:git_metrics_bg"
format = '[оӮё](fg:prev_bg bg:git_metrics_bg)([пҒЁ$deleted]($deleted_style))([ пҒ§$added]($added_style))[оӮ°](fg:git_metrics_bg)'
disabled = false

[git_commit]
style = "fg:crust bg:peach"
format = '[оӮә](fg:peach)[\($hash$tag\)]($style)[оӮј](fg:peach) '
tag_symbol = ' пҗ’ '

[cmd_duration]
format = '[вҸұ $duration]($style)'
min_time = 100 #milliseconds
show_milliseconds = true

[time]
disabled = false
time_format = "%R"
style = "bg:time_bg"
format = '[[ пҗә $time ](fg:prompt_bg bg:time_bg)]($style)'

[line_break]
disabled = false

[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
EndeavourOS = "пҶ—"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"
Pop = "пҢӘ"
